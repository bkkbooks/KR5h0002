front:
  text: 太上元始天尊說寳月光皇后聖母天尊孔雀明王經杜四啓白
  hash: sha256:6471c08b48892d19e96ac9c19c8db1880c6cd3db22262aa3e570d6763e8b4df4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0002_HFL_000-001a, image: hfl/1058/1058-102.png}
body:
  text: 奏樂稱職整聖開經各捧香啓請如注知磬舉開函演奥天尊衆和一聲大慈悲開函演奥天尊開念元從浩劫演仙章始末原由未見詳文化久行扶世運昌時廣慶助元皇大教留傳無替悉洞玄敷演有維綱仙凡混合通神感經卷昭明永發揚衆和一聲大慈悲開函演奥天尊奏樂畢大衆念稽首梵音教主皈命孔雀慈尊遍河漢之群眞滿周天之列宿本命星官流年眞宰行病布瘟之衆作威降福之神護界護壇善神侍香侍經官衆持帝鍾之初叩音徹十方聞寳號以纔宣聲通九地受今啓請已沐雲臨願降經筵證盟功德今辰奉爲入意重念某有災有患皈投解謝之門延福延生敬啓備禳之會願九結十纒之寃咎涣若氷消冀七傷八難之災迍釋如風蕩善功圓滿立降禎祥大衆虔誠舉揚聖號開念皈命孔雀大慈尊皈命天王諸聖眞消災延壽降吉祥人間天上演靈文知磬舉折開龍宫藏捧出玉琅函孔雀尊經同伸相應知磬舉消災延壽天尊衆和一聲大慈悲消災延壽天尊開念大哉元始演仙童浩劫傳來孔雀王指善修眞功不淺廣開方便顯靈壇知磬舉大慈悲消災延壽天尊開念凡諸誦經先當持念凈身口神咒至開經玄藴咒稽首長跪或坐壇端心念誦禮請衆念仰啓三清境無上三境尊仰啓大羅天無上玄穹主仰啓三清界侍宸諸眞衆妙道難思議造入資玄門妙經抉玄藴導引塵迷趣臣今凈三業口誦及心持唯願大慈悲開受臣所請慈光燭卑賤聰聴聆音聲願臣諷誦時響徹十方界成就一切願如經所稱述從此漸進脩成道事諸聖志心皈命禮請禮請輪請玉清聖境清㣲天宫鬱羅蕭臺之中森羅淨泓之上現有爲之梵相具無極之神通敷演眞玄破無有色空之礙拯提趣類絶智愚高下之分妙用難窺靈機罔測大悲大願大聖大慈無量度人元始天尊衆和一聲願降經壇證盟功德志心皈命禮請上清眞境禹餘天宫紫㣲瓊臺之中玄都玉京之上接元始虛皇之統系超西那玉國之根苗入黍米珠盡挹眞玄之精粹在香林苑屢談秘要之筌蹄妙德難思神通莫議大悲大願大聖大慈無量度人靈寳天尊衆和一聲願降經壇證盟功德志心皈命禮請太清仙境太赤天宫巍巍金闕之高渺渺重霄之上降生扵無量數劫說法扵萬二千天五千秘言融三才之妙道八十餘度接六趣之衆生聖德崇高玄功廣愽大悲大願大聖大慈無量度人降生天尊衆和一聲願降經壇證盟功德志心皈命禮請妙有眞境彌羅上宫曩示現國王之身即根本帝尊之質始相湛寂實至玄至妙以難言嗣位繼傳妙無等無倫而相踵聖父之慈悲父至尊之最上尊稱讚難窮皈依莫盡大悲大願大聖大慈光嚴妙樂國王聖父天尊衆和一聲願降經壇證盟功德志心皈命禮請妙有眞境彌羅内宫慈顔烜春日之和懿範凛秋霜之肅純全梵炁先天地以素存化現妙身歷后妃而示應具一氣胚胎之妙寓帝身生化之珠萬化祖根衆生慈母大悲大願大聖大慈寳月光皇后聖母元君衆和一聲願降經壇證盟功德志心皈命禮請彌羅内境圓相開明瑞氣烜先天之祖母慈光示釋教之宗師駕孔雀之靈現乘鸞鳳之顯應演眞經皈告扵天王談道昔從扵上帝誓願救度慈濟無邉衆生有難若稱名普護無窮而拯拔救護群品皈依莫盡大悲大願大聖大慈釋天教主孔雀明王大天尊聖母元君衆和一聲志心皈命禮請紫金金闕白玉玉京住妙有之境中處玄眞之天上功圓道備放妙相卓冠扵諸天心廣體胖故慈光遍燭扵三界位尊上極無上道妙而玄之又玄眞聖宗師天人依仗大悲大願大聖大慈穹蒼聖主玉皇天尊衆和一聲志心皈命禮請光嚴國内妙樂土中聖母凝神夢扵虛無道君授玉質扵恍惚慈愛和遜弗貪萬乘之尊榮忍辱仁柔不憚億劫之修累功高無比德重難踰大悲大願大聖大慈現無量功德之身玉皇天尊衆和一聲志心皈命禮請尊居帝位高處天宫遍逰扵一切白玉京中普現扵十方黄金闕内定而能應去來自在以無拘合而可分變化圓通而莫測演淨解脫之道濟沉迷幽苦之徒自然而然非識可識大悲大願大聖大慈現清淨自然之身玉皇天尊衆和一聲志心皈命禮請昔爲王嗣苦建玄功三千餘劫之修行有如一日億萬生靈之拯度廣及十方雖法身由胎藏之胚腪諒聖體由道源之變化不壞不㓕杳亡杳存大悲大願大聖大慈現神明堅固不壞眞空無上法身玉皇天尊衆和一聲志心皈命禮請清㣲天上大玄玉都知時至而舉六神通分法身而遍十方界如無邉境上天下地悉昭融出大妙音六道四生皆解脫表以放光之瑞相明兹本行之勝因蕩蕩難名巍巍無上大悲大願大聖大慈分軂應化玉皇天尊衆和一聲志心皈命禮請北極眞空尊居無上本行皆難行之苦行是身即清淨之道身棄國出家施財寳而捨血肉濟幽及顯宣正化而揚神功教菩薩而悟大乘證金仙而入妙道爲慈悲父誠大丈夫大悲大願大聖大慈玉帝應身清淨自然覺王如來衆和一聲志心皈命禮請與諸眷屬馭八景輿雖後會扵法筵實首陳扵偈讚花成寳蓋悉歸美扵帝光樂奏洞章欲溥沾於聖澤門五品而先一品居九天之第八天啓白元尊稱揚上帝大悲大願大聖大慈經筵啓問高虛請明王主帝君衆和一聲志心皈命禮請玉光境内寳蓋會中感上帝開利益之門爲衆生興方便之意周流沙界受眞經而五品以誦持親奉玉音敕三界十方而覆護以孝養恭敬而爲本則自在逍遥而無疑亹亹歌辭巍巍功德大悲大願大聖大慈經筵啓問昊天上帝衆和一聲志心皈命禮請寳蓋會中玉光境内從下方而來覲知至理之本同飛八凑香而旋繞道前雨衆妙花而遍覆會上護諸國土冀妙法之福含靈具六神通衛眞經而遵敕命終篇獻頌億劫長存大悲大願大聖大慈四衆八部大乘菩薩梵天一切金仙衆和一聲志心皈命禮請青華聖境東極上宫十方化號度衆生百億瑞光瞻妙相即隨機而赴感由誓願之弘深九色蓮花作慈航之彼岸一枝楊柳開甘露之法門無量度人大慈仁者大悲大願大聖大慈太一尋聲救苦天尊衆和一聲志心皈命禮請家世相韓股肱佐漢身不勞扵汗馬名已在扵丹書掉三寸舌爲帝者師受一編書作人中傑進黄石公履由志合以道同從赤松子遊遂功成而身退玉經諟證實節疏塋大悲大願大聖大慈校經主宰天樞上相法主道君天尊衆和一聲志心皈命禮請北方淨域玄武奥樞始從金闕以化身終輔玉皇而斷惡修眞學道功成扵四十二年拯濟世人澤被扵千萬億劫有求皆應無願不從威德剋比扵乾坤道力弘深扵海嶽功過必察賞罰無迯大悲大願大聖大慈北極眞武佑聖眞君玉虛師相玄天上帝終劫濟苦天尊衆和一聲志心皈命禮請本來南士上泝蜀都先獲黄帝九鼎之丹書後從老君兩度於玉局千軸得修行之要一時成吐納之功法籙全能受盟威品而結璘訣正邪兩辨奪福庭治而化鹹泉無愧大丹兼齊七政大悲大願大聖大慈三天上相玄都丈人扶教度人大法天師六合無窮高明大帝降魔護道天尊衆和一聲志心皈命禮請昔降生扵周末應禱尼靈今主宰扵皇朝維持聖治德叅太極道集大成爲百世之儒師作生民之教主毋固毋必毋我毋人删詩定書繫易執禮在在應春秋之化方方持孝義之經大悲大願大聖大慈先聖至聖大成文宣王興儒盛世天尊衆和一聲志心皈命禮請不驕帝境玉眞慶宫現九十八化之行蔵顯億萬千種之神異飛鸞開化扵在在如意救劫以生生至孝至仁功存乎儒道釋教不驕不樂職乎盡乎天地水官功德難量威靈莫測大悲大願大聖大慈九天開化主宰七曲靈應大帝談經演教消劫行化更生永命天尊衆和一聲志心皈命禮請清微天上寳蓋會中常面覩扵慈光亦親聆扵妙法以本行之經教萬代流傳俾後世之民生一忱受誦惟聖聖相承之師匠使源源不絶扵人天大悲大願大聖大慈傳經演教歷代祖師神仙聖衆衆和一聲志心皈命禮請寳蓋會中玉光境内奉上帝之敕命作三界之慈航斡運四時主張造化覆護受持是此經者滿足所欲如是願心十方帝君神仙兵馬十極神王二曜九星三官四聖五方星斗四天門王周天星衆二十八宿降魔金剛力士飛天神王四海九江五嶽四瀆山林川澤井泉溝渠十二河源龍王龍女羅叉魔耶諸大天王孔雀能仁一切主者法籙吏兵城隍社令樹木神衆土地靈官護戒護壇護經護道經筵有感一切眞仙惟願天垂寳蓋地擁金蓮臨幸道場主盟功德臣等朝眞求哀懺悔衆念樂師韻臣等自從無始劫無明煩惱覆眞心常行殺盗與邪淫兩舌妄言并綺語誹謗大乘眞正教鬥亂親朋離間人貪嗔癡暗縱三心喜怒愛惡增七慢歷劫罪根難記憶多生業垢莫能量皈依上聖大慈悲發露眞心求懺悔萬劫千生諸罪垢願從懺悔悉消除將此身心奉上聖惟願罪根悉原宥懺悔已後臣等志心同伸啓願願眼常覩玉毫相願耳常聞說法聲願鼻常嗅衆妙香願舌常讚無上道願身不染邪淫法願意常存正信心發願上報四重恩發願下濟三途苦廣運慈悲憐一切廣行方便度衆主仰惟玉帝大慈悲加護願心悉成就發願已後臣等志心皈命禮衆太上彌羅無上天妙有玄眞境渺渺紫金闕太㣲玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂眞常道恢漠大神通玉皇大天尊玄穹高上帝平坐談經如法知磬舉孔雀明王天尊衆和一聲大慈悲孔雀明王天尊開說孔雀明王一部經能令護國救凡民談演靈文消厄難廣開方便度衆生衆和一聲大慈悲孔雀明王天尊衆太上元始天尊說寳月光皇后聖母孔雀明王尊經卷上道言爾時元始天尊在大羅天上清㣲天宫浮黎國土玉羅寳臺之上放九色祥光九色蓮座鸞鳴鳳唱獅子白鶴諸天雷將四方圍繞昔扵龍漢四年七月十五日地官較會同講南靈冥筭之法度人拯拔之文道前演說時有九天雷祖大帝九天生神大帝四梵天王五老六師四聖五山眞君五嶽聖帝四瀆源王五斗眞君十一大曜本命四柱四方纒度三界四府天京地府水國陽曹二十八宿三官大帝四品火官三十二天三十二帝三元三百六十五度城隍里社憲府瘟司天下五湖四海九江八水十二河源七十二福地三百六十名山地府一十八獄冥官鄷都二十四獄女青三十六獄中央普掠八萬四千重之鬼獄大小鐵圍刀山血湖硤石無間阿鼻地獄十王冥官二百二十六天王七十羅叉女一十二侍香玉女二十一龍女六十四魔耶女一百三十龍王各各齊來集會稽首朝禮各依次第列班聼宣經意忽有一天母駕孔雀而來此乃佛中即孔雀如來道中乃是寳月光皇后玉皇聖母統集孔雀經中諸大善神俱來叅聴法音皈依大道重演道德孔雀靈文願向道中能與世間衆生解除厄難是時孔雀明王向前圍繞三匝上白天尊前妾輩女流身居兩門今日幸聞得覩慈顔演說經法願垂救度如是世間男女所結十纒三世寃債惡病久災邪魔魍魎伏逆星辰咒誓厭魅一切災禍者但能精虔禮請善道于家啓請經法一一解散氣未絶者應係過世寃家解盡三日即安清淨身心衣服新鮮開啓關白各䖏神祠特與某追魂趕命牒告雷將領承玉清之符命玉皇之尊言虔請正一道士或三五七道衆或在家庭或於觀宇請誦經懺然燈行道依科脩奉無不應驗此是天皇之妙言成上奉行宣命五方雷公五方雷王八方雲雷使者雷部總兵使者九天採訪使者各各發號施令稽首皈依遵守而行爾時元始天尊說寳月光皇后聖母天尊孔雀明王經詳夫此經原是大洞經中骨髓經中之造化經中之運用因此廣傳下世得此法音稽首道聼時有大衆再告天尊言自昔元始授之